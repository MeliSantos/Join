<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join</title>
    <link rel="stylesheet" href="./styles/basic-design.css">
    <link rel="stylesheet" href="./styles/summary.css">

</head>

<body>
    <header class="mainHeader">
        <span class="textHeader">Kanban Project Management Tool</span>
        <div class="infoRight">
            <img class="helpIcon" src="./assets/img/help.png" alt="help Icon">
            <div class="userIcon"></div>
        </div>
    </header>
    </header>
    <main>
        <section class="mainSection">
            <nav class="navLeftSide">
                <div class="logo"></div>
                <div class="navButtonContainer">
                    <a class="navButton" href="#">Summary</a>
                    <a class="navButton" href="#">Add Task</a>
                    <a class="navButton" href="#">Board</a>
                    <a class="navButton" href="#">Contacts</a>
                </div>

                <div class="navFooter">
                    <div class="footerContent">
                        <a href="#">Privacy Policy</a>
                        <a href="#">Legal notice</a>
                    </div>
                </div>
            </nav>


            <section class="contentRight">
                <div class="mainDiv">
                    <div class="mainLeft">
                        <div class="summaryHeader">
                            <div>
                                <h1> Join 360 </h1>
                            </div>
                            <div class="blueSeparationLine"></div>
                            <div>
                                <h3>Key Metrics at a Glance</h3>
                            </div>
                        </div>

                        <div class="summaryMainContent">
                            <div class="firstSectionSummary">
                                <div class="summaryFirstCard">
                                    <div>
                                        <img src="./assets/img/Frame59todo.png" alt="To do Logo">
                                    </div>
                                    <div>
                                        <div class="tasksNumber">1</div>
                                        <div class="statusTasks">To-do</div>
                                    </div>
                                </div>
                                <div class="summaryFirstCard">
                                    <div>
                                        <img src="./assets/img/Frame59done.png" alt="Done Logo">
                                    </div>
                                    <div>
                                        <div class="tasksNumber">1</div>
                                        <div class="statusTasks">Done</div>
                                    </div>
                                </div>
                            </div>

                            <div class="secondSectionSummary">
                                <div class="summarySecondCard">
                                    <div class="secondCardLeft">
                                        <div>
                                            <img src="./assets/img/Frame59urgent.png" alt="Urgent Logo">
                                        </div>
                                        <div>
                                            <div class="tasksNumber">1</div>
                                            <div class="subtext">Urgent</div>
                                        </div>
                                    </div>
                                    <div class="separationLine"></div>
                                    <div class="deadlineContent">
                                        <div class="currentDate">October 16, 2022</div>
                                        <div class="subtext">Upcoming Deadline</div>
                                    </div>
                                </div>

                            </div>

                            <div class="thirdSectionSummary">
                                <div class="summaryThirdCard">
                                    <div>
                                        <div class="tasksNumber">1</div>
                                        <div class="statusTasks">Tasks in <br>Board</div>
                                    </div>
                                </div>
                                <div class="summaryThirdCard">
                                    <div>
                                        <div class="tasksNumber">1</div>
                                        <div class="statusTasks">Tasks in <br>Progress</div>
                                    </div>
                                </div>
                                <div class="summaryThirdCard">
                                    <div>
                                        <div class="tasksNumber">1</div>
                                        <div class="statusTasks">Awaiting <br>Feedback</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="mainRight">
                        <h2> Good morning!</h2>
                    </div>
                </div>
            </section>

    </main>

</body>

</html>
