<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join</title>
    <link rel="stylesheet" href="./styles/basic-design.css">
    <link rel="stylesheet" href="./styles/board.css">
    <link rel="stylesheet" href="./styles/addTaskDialog.css">

</head>

<body onload="init()">
    <header class="mainHeader">
        <span class="textHeader">Kanban Project Management Tool</span>
        <div class="infoRight">
            <img class="helpIcon" src="./assets/img/help.png" alt="help Icon">
            <div class="userIcon"></div>
        </div>
    </header>
    <main>
        <nav class="navLeftSide">
            <div class="navContent">
                <div class="logo"></div>
                <div class="navButtonContainer">
                    <a class="navButton" href="./summaryUser.html">Summary</a>
                    <a class="navButton" href="./addTask.html">Add Task</a>
                    <a class="navButton" href="./board.html">Board</a>
                    <a class="navButton" href="./contacts.html">Contacts</a>
                </div>

                <div class="navFooter">
                    <div class="footerContent">
                        <a href="#">Privacy Policy</a>
                        <a href="#">Legal notice</a>
                    </div>
                </div>
            </div>
        </nav>

        <section class="mainSection contentRight">
            <div class="boardHeader">
                <div>
                    <h1>Board</h1>
                </div>
                <div class="boardHeaderLeft">
                    <div class="inputSearch"><input type="search" placeholder="Find Task">
                        <div class="separationLine"></div>
                        <img src="./assets/img/search.png" alt="Search Icon" class="inputIcon">
                    </div>
                    <div><button class="btn1 btnContent" onclick="openAddTask()">Add Task <img
                                src="./assets/img/add.svg" alt="Add Icon"></button>
                    </div>
                </div>

            </div>
            <div class="taskStatus">
                <div class="taskdiv">
                    <div class="taskDivContent"> To do </div> <img src="./assets/img/plus button.png" alt="Add Icon">
                </div>
                <div class="taskdiv">
                    <div class="taskDivContent"> In progress </div> <img src="./assets/img/plus button.png"
                        alt="Add Icon">
                </div>
                <div class="taskdiv">
                    <div class="taskDivContent"> Await feedback </div> <img src="./assets/img/plus button.png"
                        alt="Add Icon">
                </div>
                <div class="taskdiv">
                    <div class="taskDivContent"> Done </div>
                </div>
            </div>
            <div class="taskContentSection">
                <div class="tasksContent" ondrop="moveTo('todo')" ondragover="dragoverHandler(event)">
                    <div id="todo"></div>
                    <div class="noTask" id="noTaskTodo">No tasks to do</div>
                </div>
                <div class="tasksContent" ondrop="moveTo('inProgress')" ondragover="dragoverHandler(event)">
                    <div id="inProgress"></div>
                    <div class="noTask" id="noTaskInProgress">No tasks in progress</div>
                </div>
                <div class="tasksContent" ondrop="moveTo('awaitingFeedback')" ondragover="dragoverHandler(event)">
                    <div id="awaitingFeedback"></div>
                    <div class="noTask" id="noTaskAwaitingFeedback">No tasks awaiting feedback</div>
                </div>
                <div class="tasksContent" ondrop="moveTo('done')" ondragover="dragoverHandler(event)">
                    <div id="done"></div>
                    <div class="noTask" id="noTaskDone">No tasks done</div>
                </div>
            </div>
        </section>

    </main>

    <div id="addTaskOverlay" class="overlay" onclick="closeAddTask()"></div>



    <div id="addTaskPanel" class="add-task-panel">


        <section class="contentRight">
            <div class="mainDiv">
                <div class="mainLeft">
                    <div class="addTaskHeader">
                        <div>
                            <h1> Add Task </h1>
                        </div>
                        <div>
                            <button class="closeAddTaskbtn" onclick="closeAddTask()">
                                <img src="./assets/img/close.svg" alt="close Icon">
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            <section class="mainTask">
                <div class="descriptionTask">
                    <div class="title">
                        <label for="title" required>Title<span class="required">*</span></label>
                        <input type="text" id="title" name="title" placeholder="Enter a title">
                    </div>
                    <div class="description">
                        <label for="des">Description</label>
                        <input type="text" id="des" name="des" placeholder="Enter a description">
                    </div>
                    <div class="date">
                        <label for="date" required>Due date<span class="required">*</span></label>
                        <input type="date" id="date" name="date" placeholder="dd/mm/yyyy">
                    </div>
                </div>
                <div class="separateLine"></div>
                <div class="infoTask">
                    <section class="priority">
                        <p class="priorityP">Priority</p>
                        <div class="priorityOptions">
                            <button class="priorityButton high">Urgent
                                <img src="./assets/img/urgent.png" alt="Urgent">
                            </button>
                            <button class="priorityButton medium">Medium
                                <img src="./assets/img/medium.png" alt="Medium">
                            </button>
                            <button class="priorityButton low">Low
                                <img src="./assets/img/low.png" alt="Low">
                            </button>
                        </div>
                    </section>
                    <section class="assignedTo">
                        <p class="assignedToP">Assigned to</p>
                        <select name="assignedTo" id="assignedTo">
                            <option value="">Select contacts to assign</option>
                        </select>
                    </section>
                    <section class="assignedTo">
                        <p class="assignedToP" required>Category<span class="required">*</span></p>
                        <select name="category" id="category">
                            <option value="">Select a category</option>
                        </select>
                    </section>
                    <section class="assignedTo">
                        <p class="assignedToP">Subtasks</p>
                        <input type="text" id="subtask" name="subtask" placeholder="Enter a title">
                        </select>
                    </section>
                </div>

            </section>

            <section class="buttonLine">
                <div>
                    <p> <span class="required">*</span>This field is required </p>
                </div>
                <div class="buttonLineContent">
                    <button type="button" class="btn2 btnContent cancel" id="guestLogIn" onclick="closeAddTask()">Cancel
                        <img class="deletIcon" src="./assets/img/iconoir_cancel.png" alt="delete Icon">
                    </button>
                    <button type="button" class="btn1" id="createTaskBtn" onclick="createTask()">Create Task
                        <img class="checkIcon" src="./assets/img/check.png" alt="check Icon">
                    </button>
                </div>
            </section>
        </section>
    </div>
    <div id="taskDialogOverlay" class="overlay" onclick="closeTaskDialog()"></div>

    <div id="taskDialog" class="task-dialog">

        <script src="./JS/userDisplay.js"></script>
        <script src="./board.js"></script>
        <script src="./addTaskDialog.js"></script>

    </div>

</body>

</html>
